services:
  verdenote-node:
    build:
      context: .
    container_name: verdenote-node
    environment:
      PORT: 4000
      VERDENOTE_CORE_URL: http://host.docker.internal:8080
      VERDENOTE_NODE_CORS_ORIGIN: https://verdenote.sobrinholabs.tech
      VERDENOTE_REALTIME_SERVICE_SECRET: dev-realtime-service-secret-change-before-production
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
